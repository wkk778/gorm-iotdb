name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    name: test / go-${{ matrix.go-version }} / ${{ matrix.os }} / iotdb-${{ matrix.iotdb-version }}
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.20", "1.21"]
        os: [ubuntu-latest, macos-latest]
        iotdb-version: ["1.1.2", "1.2.0"]
    runs-on: ${{ matrix.os }}
    env:
      IOTDB_VERSION: ${{ matrix.iotdb-version }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - run: go test ./...
      - run: go test ./tests/...
